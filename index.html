<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoulBound Identity - Modular Version</title>

    <!-- React 18 - PRODUCTION -->
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>

    <!-- Babel Standalone -->
    <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>

    <!-- Ethers.js v5 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

    <!-- snarkjs for ZK proof generation in browser -->
    <script src="https://unpkg.com/snarkjs@0.7.6/build/snarkjs.min.js"></script>

    <!-- QR Code generation (QRious - reliable UMD/cdnjs build) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="root"></div>

    <script>
        console.log('🚀 Starting modular app load...');
        console.log('✅ React available:', typeof React !== 'undefined');
        console.log('✅ ReactDOM available:', typeof ReactDOM !== 'undefined');
        console.log('✅ Babel available:', typeof Babel !== 'undefined');
        console.log('✅ ethers available:', typeof ethers !== 'undefined');

        // Expose React hooks globally for dynamically evaluated modules
        window.useState = React.useState;
        window.useEffect = React.useEffect;
        window.useCallback = React.useCallback;
        window.useMemo = React.useMemo;
        window.useRef = React.useRef;
        window.useContext = React.useContext;
    </script>

    <!--
      Use Babel script tags instead of fetch/eval so the app can be opened directly
      without requiring a local HTTP server.
    -->
    <script type="text/babel" data-presets="react" src="contracts.js"></script>
    <script type="text/babel" data-presets="react" src="utils.js"></script>
    <script type="text/babel" data-presets="react" src="components/theme.js"></script>
    <script type="text/babel" data-presets="react" src="components/toast.js"></script>
    <script type="text/babel" data-presets="react" src="components/ui.js"></script>
    <script type="text/babel" data-presets="react" src="components/app-component.js"></script>
    <script type="text/babel" data-presets="react" src="components/header.js"></script>
    <script type="text/babel" data-presets="react" src="components/welcome.js"></script>
    <script type="text/babel" data-presets="react" src="components/navigation.js"></script>
    <script type="text/babel" data-presets="react" src="components/notification.js"></script>
    <script type="text/babel" data-presets="react" src="components/identity-tab.js"></script>
    <script type="text/babel" data-presets="react" src="components/qr-code.js"></script>
    <script type="text/babel" data-presets="react" src="components/token-card.js"></script>
    <script type="text/babel" data-presets="react" src="components/credentials-tab.js"></script>
    <script type="text/babel" data-presets="react" src="components/access-control-tab.js"></script>
    <script type="text/babel" data-presets="react" src="components/social-tab.js"></script>
    <script type="text/babel" data-presets="react" src="components/reputation-section.js"></script>
    <script type="text/babel" data-presets="react" src="components/projects-section.js"></script>
    <script type="text/babel" data-presets="react" src="components/endorsements-section.js"></script>
    <script type="text/babel" data-presets="react" src="components/zkp-section.js"></script>
    <script type="text/babel" data-presets="react" src="components/analytics-tab.js"></script>
    <script type="text/babel" data-presets="react" src="components/view-identities-tab.js"></script>
    <script type="text/babel" data-presets="react" src="app.js"></script>
</body>
</html>
